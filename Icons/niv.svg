<svg width="900" height="140" viewBox="0 0 900 140" fill="none" xmlns="http://www.w3.org/2000/svg">  
  <defs>  
    <!-- Smooth looping purple gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">  
      <stop offset="0%" stop-color="#4B0082" />   <!-- Deep/Dark Purple -->
      <stop offset="25%" stop-color="#8A2BE2" />  <!-- Medium Purple -->
      <stop offset="50%" stop-color="#D8BFD8" />  <!-- Light/Thistle Purple -->
      <stop offset="75%" stop-color="#8A2BE2" />  <!-- Medium Purple -->
      <stop offset="100%" stop-color="#4B0082" /> <!-- Deep/Dark Purple -->
      
      <!-- Animates the transform x-axis continuously for a flowing effect -->
      <animateTransform  
        attributeName="gradientTransform"  
        type="translate"  
        from="0 0"  
        to="900 0"  
        dur="4s"  
        gradientUnits="userSpaceOnUse"
        repeatCount="indefinite"  
      />
    </linearGradient>

    <!-- Subtle glow filter to make the purple pop against dark background -->
    <filter id="softGlow" x="-20%" y="-50%" width="140%" height="200%">  
      <feGaussianBlur stdDeviation="3" result="blur" />  
      <feMerge>  
        <feMergeNode in="blur" />  
        <feMergeNode in="SourceGraphic" />  
      </feMerge>  
    </filter>
  </defs>    

  <!-- Background rect removed for total transparency -->
  <text
    x="50%"
    y="52%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
    font-size="58"
    font-weight="700"
    letter-spacing="2"
    fill="url(#textGradient)"
    filter="url(#softGlow)"
  > 
    Nivalos (@nivalos0)
  </text>  
</svg>
