<svg width="900" height="140" viewBox="0 0 900 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#FF0000" />
  <stop offset="16%" stop-color="#FF7F00" />
  <stop offset="33%" stop-color="#FFFF00" />
  <stop offset="50%" stop-color="#00FF00" />
  <stop offset="66%" stop-color="#0000FF" />
  <stop offset="83%" stop-color="#4B0082" />
  <stop offset="100%" stop-color="#9400D3" />

  <animateTransform
    attributeName="gradientTransform"
    type="translate"
    from="-900 0"
    to="900 0"
    dur="4s"
    repeatCount="indefinite"
  />
</linearGradient>

    <filter id="softGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="140" rx="24" fill="#050505" fill-opacity="0.04" />

  <text
    x="50%"
    y="52%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
    font-size="58"
    font-weight="700"
    letter-spacing="2"
    fill="url(#textGradient)"
    filter="url(#softGlow)"
  >
    Nivalos (@nivalos0)
  </text>
</svg>